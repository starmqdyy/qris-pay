<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pembayaran QRIS</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f6f7fb;
      margin: 0;
      padding: 24px;
      text-align: center;
      color: #222;
    }
    .card {
      max-width: 520px;
      margin: 0 auto;
      background: white;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.08);
    }
    h1 {
      margin-top: 0;
      font-size: 28px;
    }
    p {
      line-height: 1.6;
    }
    img {
      width: 100%;
      max-width: 380px;
      height: auto;
      border-radius: 12px;
      margin: 16px 0;
    }
    .note {
      font-size: 14px;
      color: #666;
    }
    .btn {
      display: inline-block;
      margin-top: 12px;
      padding: 12px 18px;
      border-radius: 10px;
      text-decoration: none;
      background: #111827;
      color: white;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Pembayaran QRIS</h1>
    <p>Silakan scan QRIS di bawah ini untuk melakukan pembayaran.</p>

    <img src="qris.png" alt="QRIS Pembayaran">

    <p class="note">
      Setelah transfer, mohon kirim bukti pembayaran ke admin.
    </p>

    <a class="btn" href="qris.png" target="_blank">Buka gambar QRIS penuh</a>
  </div>
</body>
</html>
